<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Comp Dashboard</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body { background: #f5f7fb; }
    #map { height: 420px; }
  </style>
</head>

<body class="text-slate-800">

<div class="max-w-7xl mx-auto p-4 md:p-6 space-y-6">

  <!-- TOP BAR -->
  <div class="bg-white rounded-2xl p-4 shadow flex flex-wrap gap-3 items-center">
    <input
      id="listingUrlInput"
      type="text"
      value="https://www.airbnb.com/rooms/1582872951053871107"
      class="w-full md:w-[420px] px-4 py-2 rounded-xl bg-slate-100 outline-none"
    />

    <select id="monthPicker" class="px-4 py-2 rounded-xl bg-slate-100">
      <option value="2026-05">May 2026</option>
      <option value="2026-06">June 2026</option>
      <option value="2026-07">July 2026</option>
    </select>

    <button id="scanBtn" class="px-5 py-2 rounded-xl bg-black text-white">
      Scan Real Data
    </button>
  </div>

  <!-- MAP -->
  <div class="bg-white rounded-2xl p-4 shadow">
    <h2 class="text-lg font-semibold mb-3">Map</h2>
    <div id="map"></div>
  </div>

  <!-- TABLE -->
  <div class="bg-white rounded-2xl p-4 shadow overflow-x-auto">
    <table class="w-full text-sm">
      <thead>
        <tr class="text-left border-b">
          <th class="py-2">Date</th>
          <th>Your</th>
          <th>Avg</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

</div>

<script>
let map = L.map('map').setView([33.8188, -78.6800], 13);

L.tileLayer('https://a.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

let markers = [];

function render(data) {

  // MAP
  markers.forEach(m => map.removeLayer(m));
  markers = [];

  const you = L.marker([data.property.lat, data.property.lng]).addTo(map);
  you.bindPopup("YOU");
  markers.push(you);

  data.comps.forEach(c => {
    const m = L.marker([c.lat, c.lng]).addTo(map);
    m.bindPopup(c.title);
    markers.push(m);
  });

  map.setView([data.property.lat, data.property.lng], 14);

  // TABLE
  const body = document.getElementById("tableBody");
  body.innerHTML = "";

  data.dates.forEach(d => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td class="py-2">${d.label}</td>
      <td>${d.yourRate ?? '-'}</td>
      <td>${d.compAvg ?? '-'}</td>
      <td>${d.status}</td>
      <td>${d.action.action} ${d.action.changePct}%</td>
    `;

    body.appendChild(tr);
  });
}

document.getElementById("scanBtn").onclick = async () => {

  const url = document.getElementById("listingUrlInput").value;
  const month = document.getElementById("monthPicker").value;

  try {
    const res = await fetch(`/api/scan?url=${encodeURIComponent(url)}&month=${month}`);
    const data = await res.json();

    if (!res.ok) throw new Error(data.error);

    render(data);

  } catch (e) {
    alert("Error: " + e.message);
  }
};
</script>

</body>
</html>
