<div class="row">

  <div>

    <label>Default Rent</label>

    <input
      type="text"
      id="defaultRent"
    >

  </div>

  <div>

    <label>Default Deposit</label>

    <input
      type="text"
      id="defaultDeposit"
    >

  </div>

</div>

<label>Available Date</label>

<input
  type="date"
  id="defaultAvailableDate"
>

<label>Pets Allowed</label>

<select
  id="defaultPetsAllowed"
  onchange="togglePetDeposit()"
>

  <option>No</option>
  <option>Yes</option>
  <option>Subject To Approval</option>

</select>

<div id="petDepositBox">

  <label>Pet Deposit / Pet Rent</label>

  <input
    type="text"
    id="defaultPetDeposit"
  >

</div>
